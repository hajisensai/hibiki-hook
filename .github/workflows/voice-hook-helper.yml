# galgame 引擎-hook 注入器 helper 的打包/分发 workflow（独立仓库 hibiki-voice-hook）。
#
# 部署红线（CMakeLists.txt / 原 hibiki docs/specs/galgame-mining）：这套 injector + hook DLL
# 含 CreateRemoteThread/WriteProcessMemory 注入代码，必被杀软启发式报毒。故与 hibiki 主 app
# 物理隔离到本独立仓库，单独构建/分发；hibiki 运行时按需从本仓库固定 tag release 下载对应
# 架构 zip，解压到 <app目录>\voice_hook\<arch>\。
#
# 与主发布流的隔离：
# - 本仓库只放 helper，默认分支即本 workflow 所在分支，workflow_dispatch 可正常触发
#   （旧版在 hibiki 仓库因 workflow 不在默认分支无法 dispatch，故迁出独立仓库根治）。
# - 发布到固定 tag `voice-hook-helper` 的 prerelease、非 Latest release。
#
# 每架构分发 4 个文件（injector.exe + hook.dll + LunaHook<arch>.dll + LunaHost<arch>.dll），
# 打成 voice_hook_<arch>.zip（文件平铺在 zip 根）+ .sha256 侧车供 app 校验完整性。app 下载 URL：
#   https://github.com/<owner>/hibiki-voice-hook/releases/download/voice-hook-helper/voice_hook_<arch>.zip
name: voice-hook-helper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      # P0 单一真相源守卫：schema/真实样本证据必须有效，生成文档不得漂移。
      - name: Verify engine support manifest
        run: |
          python tools/generate_engine_support.py --check
          python tests/engine_support_manifest_test.py

      # 32/64 位分开构建（DLL 位数必须匹配目标游戏进程）。windows-2022 runner 自带
      # Visual Studio 2022 + CMake，多配置生成器用 -A x64 / -A Win32 选架构平台。
      - name: Configure & build (x64)
        run: |
          cmake -S . -B build/x64 -A x64
          cmake --build build/x64 --config Release

      - name: Configure & build (x86)
        run: |
          cmake -S . -B build/x86 -A Win32
          cmake --build build/x86 --config Release

      # 只挑分发所需的 4 个文件（诊断用 ring_probe / luna_symcheck 不分发）。CMake POST_BUILD
      # 已把 vendored LunaHook<arch>.dll / LunaHost<arch>.dll 拷进各 arch 的 Release 目录。
      - name: Stage helper files
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path dist/x64, dist/x86 | Out-Null
          Copy-Item build/x64/Release/hibiki_voice_injector.exe dist/x64/
          Copy-Item build/x64/Release/hibiki_voice_hook.dll      dist/x64/
          Copy-Item build/x64/Release/LunaHook64.dll             dist/x64/
          Copy-Item build/x64/Release/LunaHost64.dll             dist/x64/
          Copy-Item build/x86/Release/hibiki_voice_injector.exe dist/x86/
          Copy-Item build/x86/Release/hibiki_voice_hook.dll      dist/x86/
          Copy-Item build/x86/Release/LunaHook32.dll             dist/x86/
          Copy-Item build/x86/Release/LunaHost32.dll             dist/x86/

      # 契约守卫：每架构必须正好 4 个文件，缺一即失败（防漏 DLL 导致 app 端注入器起不来）。
      - name: Verify 4 files per arch
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($arch in 'x64', 'x86') {
            $count = (Get-ChildItem "dist/$arch" -File).Count
            if ($count -ne 4) { throw "arch $arch expected 4 files, got $count" }
          }

      # 打 zip（文件平铺在 zip 根）+ 产出 sha256 侧车（小写十六进制），供 app 下载后校验完整性。
      - name: Zip + sha256
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($arch in 'x64', 'x86') {
            $zip = "dist/voice_hook_$arch.zip"
            Compress-Archive -Path "dist/$arch/*" -DestinationPath $zip -Force
            $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
            Set-Content -Path "$zip.sha256" -Value $hash -NoNewline
            Write-Host "$arch sha256=$hash"
          }

      # 固定 tag `voice-hook-helper` 反复 upsert 同一 release（softprops 有则更新、无则创建，同名
      # asset 自动覆盖）；prerelease + 非 Latest。
      - name: Publish helper release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: voice-hook-helper
          target_commitish: ${{ github.sha }}
          name: Galgame voice hook helper
          body: |
            Galgame 引擎-hook 注入器 helper（独立分发组件，含进程注入代码，杀软可能报毒——预期行为）。
            Hibiki 开 galgame 需要注入器却缺失时按需下载对应架构 zip，解压到 voice_hook/<arch>/。
            本 release 为 prerelease、非 Latest，不属于主 app 安装包。
          prerelease: true
          make_latest: false
          files: |
            dist/voice_hook_x64.zip
            dist/voice_hook_x86.zip
            dist/voice_hook_x64.zip.sha256
            dist/voice_hook_x86.zip.sha256
